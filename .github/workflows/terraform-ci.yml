name: Terraform CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build zip
        run: cd app/ && zip function.zip index.js

      - uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: app/function.zip

  terraform:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: function-zip
          path: app/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform fmt check
        working-directory: infra/
        run: terraform fmt --check -recursive

      - name: Terraform init
        working-directory: infra/
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: infra/
        run: |
          terraform plan -var-file=envs/dev/dev.tfvars -no-color -out=tfplan 2>&1 | tee plan.txt
          terraform show -no-color tfplan >> plan.txt
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const body = `<details><summary>Terraform plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
